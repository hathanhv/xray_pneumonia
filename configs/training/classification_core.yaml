training:
  epochs: 20
  monitor: val_loss
  early_stopping_patience: 5
  optimizer:
    name: adamw
    learning_rate: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
  loss:
    name: weighted_cross_entropy
    label_smoothing: 0.05

augmentation:
  name: baseline
  horizontal_flip: 0.5
  rotation: 7

sampler:
  name: random

dataloader:
  batch_size: 16
  num_workers: 0
  pin_memory: true
